{% load static %}
{% with op_color_2="#1D65A6" op_color_5="#93C4F0" grey_color="#dee2e6" %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OmicsPred REST API documentation</title>
    <meta name="keywords" content="omicspred, genetic score, omics, multi-omics, proteomics, metabolomics, transcriptomics, metadata, genomic, programmatic, rest, api" /><!-- 3 to 10 keywords about the content of this page (not the whole project) -->
    <meta name="author" content="Omicspred" /><!-- Your [project-name] here -->
    <meta name="description" content="Programmatic access to the OmicsPred metadata via a REST API." />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="{{ op_color_2 }}" /> <!-- Android Chrome mobile browser tab color -->

    {% include "rest_api/src.html" %}
    <script>
      window.onload = function() {
        // Begin Swagger UI call region
        const ui = SwaggerUIBundle({
          url: "{% static 'rest_api/openapi/openapi-schema.yml' %}",
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [
            SwaggerUIBundle.presets.apis,
            //SwaggerUIStandalonePreset
            //SwaggerUIStandalonePreset.slice(1)
          ],
          plugins: [ SwaggerUIBundle.plugins.DownloadUrl ],
          //layout: "StandaloneLayout",
          defaultModelsExpandDepth: 0, // Collapse the Schemas section by default (set to 0). Hide the Schemas section if it's set to -1.
          validatorUrl: 'none' // Hide the validator badge at the bottom of the page
        })
        // End Swagger UI call region
        window.ui = ui


        //-----------------------------------//
        // Update default display of Swagger //
        //-----------------------------------//

        // Remove Swagger header
        //setTimeout(function(){
        //  var topbar = document.getElementsByClassName("topbar")[0];
        //  topbar.parentNode.removeChild(topbar);
        //}, 5);

        // Remove the list of servers
        setTimeout(function(){

          // Remove Swagger header
          //var topbar = document.getElementsByClassName("topbar")[0];
          //topbar.parentNode.removeChild(topbar);

          // Add Swagger logo
          var hgroup = document.getElementsByTagName("hgroup")[0];
          // Create 'div' class and add it ti the hgroup
          var title_div = document.createElement("div");
          title_div.classList.add('clearfix');
          hgroup.insertBefore(title_div,hgroup.firstChild);
          // Move title within the 'div'
          var title = hgroup.getElementsByClassName("title")[0];
          title.style.float = 'left';
          title.style.paddingRight = '1rem';
          title.style.borderRight = '1px solid #222';
          title_div.appendChild(title);
          // Create link node for Swagger
          var swagger_link =  document.createElement("a");
          swagger_link.title = 'REST API documentation generated by Swagger UI';
          swagger_link.href = 'https://swagger.io/tools/swagger-ui/';
          swagger_link.setAttribute('target', '_blank');
          swagger_link.style.paddingLeft = '1rem';
          // Create image node for Swagger
          var swagger_logo = document.createElement("img");
          swagger_logo.src = "{% static 'rest_api/openapi/swagger-dist-ui/swagger-logo.png' %}";
          swagger_logo.style.maxHeight = '40px';
          swagger_link.appendChild(swagger_logo);
          title_div.appendChild(swagger_link);

          // Remove openapi link
          var oa_link = hgroup.getElementsByClassName("link")[0];
          oa_link.parentNode.removeChild(oa_link);

          // Remove the list of servers
          var servers_list = document.getElementsByClassName("scheme-container")[0];
          servers_list.parentNode.removeChild(servers_list);

          // Remove website URL
          contact_elem = document.getElementsByClassName("info__contact");
          url_elem = contact_elem[0].getElementsByTagName("div")[0];
          url_elem.parentNode.removeChild(url_elem);


          // List of Endpoints
          var info_block = document.getElementsByClassName("info")[0];
          info_block.appendChild(document.createElement("hr"));

          var parent_info = info_block.parentNode;
          // Create a container for the list of endpoints
          var ep_list = document.createElement("div");
          ep_list.classList.add('endpoints_list');
          // Add title to the list of endpoints
          var ep_title = document.createElement("div");
          ep_title.innerHTML = 'Endpoints:';
          ep_list.appendChild(ep_title);
          // Add sub-container for the list of endpoints
          var ep_list_div = document.createElement("div");
          // Create link for each endpoint
          var endpoint_headers = document.getElementsByClassName('opblock-tag');
          for (i=0; i < endpoint_headers.length; i++) {
            // Fetch endpoint information
            var ep_header_title = endpoint_headers[i].getAttribute('data-tag');
            // Endpoint name
            ep_header_title = ep_header_title.replace(' endpoints', '');
            // Endpoint ID
            var ep_header_id = endpoint_headers[i].getAttribute('id');
            // Endpoint description
            var endpoint_desc = endpoint_headers[i].getElementsByClassName('renderedMarkdown')[0].innerHTML;
            endpoint_desc = endpoint_desc.replace(/<\/?[^>]+(>|$)/g, "");

            // Add information to the link element
            var ep_header = document.createElement("a");
            ep_header.href = '#'+ep_header_id;
            ep_header.className = 'btn btn-primary'
            ep_header.innerHTML = ep_header_title;
            ep_header.title = endpoint_desc;
            ep_header.setAttribute("data-toggle", "tooltip");
            ep_header.setAttribute("data-placement", "bottom");
            ep_list_div.appendChild(ep_header);
          }
          ep_list.appendChild(ep_list_div);

          parent_info.appendChild(ep_list);

          // Replace content
          var endpoints_list = document.getElementsByClassName("opblock-summary-path");
          for (i=0; i < endpoints_list.length; i++) {
            span = endpoints_list[i].getElementsByTagName("span")[0];
            span.innerHTML = span.innerHTML.replace(/(\/)/g, "<span class=\"colour_1\">$1</span>");
            span.innerHTML = span.innerHTML.replace(/(\{|\})/g, "<span class=\"colour_2\">$1</span>");
          }

          // Remove from schema
          models_to_remove = ['Pagination','Error_4XX','ScoreOmics'];
          var schema_obj = document.getElementsByClassName("json-schema-2020-12__title");
          for (var i = 0; i < schema_obj.length; i++) {
            for (var j = 0;j < models_to_remove.length; j++) {
              var element = schema_obj[i];
              if (element) {
                if (element.textContent == models_to_remove[j]) {
                  var parent_element = element.closest('.json-schema-2020-12');
                  parent_element.parentElement.removeChild(parent_element)
                }
              }
            }
          }


          // Update Execute buttons
          var execute_button = document.createElement("i");
          execute_button.className=("bi bi-caret-right-fill");
          var execute_buttons = document.getElementsByClassName('execute');
          for (var i = 0; i < execute_buttons.length; i++) {
            var element = execute_buttons[i];
            element.appendChild(execute_button);
          }

          // Handle search form
          // Input
          document.getElementById('search_form').addEventListener('keypress', function (event) {
            if (event.keyCode === 13) { // Enter
              event.preventDefault();
              redirect_search();
            }
          });
          // Button
          document.getElementById('search_btn').addEventListener('click', function (event) {
            event.preventDefault();
            redirect_search();
          });
          function redirect_search() {
            var search_input = document.getElementById("search_query");
            var query_val = search_input.value;
            if (query_val && query_val != '') {
              window.location.href = "https://www.omicspred.org/search?q="+query_val.toString();
            }
          }
          // Toggle buttons
          var button_ids = ['pagination', 'rate_limit', 'changelog'];
          for (var i=0; i < button_ids.length; i++){
            let btn_id = button_ids[i];
            console.log(btn_id);
            // Content container
            let btn_div_container = document.getElementById('content_'+btn_id);
            btn_div_container.classList.add('toggle_content');
            btn_div_container.style.display='none';
            // Toggle button
            let btn_to_toggle = document.getElementById(btn_id);
            btn_to_toggle.classList.add('toggle_btn','btn_plus');
            btn_to_toggle.addEventListener("click", function (event) {
              toggle_btn(btn_to_toggle, btn_div_container);
            });
          }

          function toggle_btn(element, btn_div_container) {

            var plus_btn_class = "btn_plus";
            var minus_btn_class = "btn_minus";

            if (element.classList.contains(plus_btn_class)) {
              console.log("Clicked - expand "+element.id);
              element.classList.remove(plus_btn_class);
              element.classList.add(minus_btn_class);
              btn_div_container.style.display = "block";
            }
            else {
              console.log("Clicked - collapse "+element.id);
              element.classList.remove(minus_btn_class);
              element.classList.add(plus_btn_class);
              btn_div_container.style.display = "none";
            }
          }
        }, 100);
      }
    </script>
  </head>
  <body>

    {% include "rest_api/header.html" %}

    <div class="container-fluid container-extra" style="margin-top:5rem">
      <div id="swagger-ui"></div>
    </div>

    {% include "rest_api/footer.html" %}
  </body>
</html>
{% endwith %}

  ## Other ##
  /api/info:
    get:
      tags:
        - "Other endpoints"
      operationId: getInfo
      description: |
        Return diverse information related to the REST API and OmicsPred, including:
        * REST API version
        * Data count (scores, phenotype associations, ...)

        Example of request:
        ```
        https://rest.omicspred.org/api/info/
        ```
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: "OmicsPred information such as REST API version, data counts, ..."
                type: object
                properties:
                  rest_api:
                    type: object
                    description: "Information about the current version of the REST API"
                    properties:
                      version:
                        type: string
                        description: "REST API version"
                        example: "1.0"
                  data_count:
                    type: object
                    description: "Counts of the different type of data in OmicsPred"
                    properties:
                      scores:
                        type: number
                        description: "Number of Genetic Scores in OmicsPred"
                        example: 20805
                      publications:
                        type: number
                        description: "Number of Publications/Studies in OmicsPred"
                        example: 10
                      platforms:
                        type: number
                        description: "Number of different Platforms in OmicsPred"
                        example: 5
                      pathways:
                        type: number
                        description: "Number of Pathways (Reactome) in OmicsPred"
                        example: 202
                      phenotypes:
                        type: number
                        description: "Number of Phenotypes in OmicsPred"
                        example: 18404
                      phenotype_associations:
                        type: number
                        description: "Number of Phenotype associations in OmicsPred"
                        example: 20342
                      tissues:
                        type: number
                        description: "Number of Tissues in OmicsPred"
                        example: 4
            description: 'Diverse information about the project, such as REST API version, data counts, ...'
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)

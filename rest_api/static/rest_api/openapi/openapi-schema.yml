        Retrieve an OmicsPred Genetic Score, including:
          * Score ID and name
          * Method used
          * Dataset name
          * Publication information
          * Platform information
          * Tissue information
          * Reported molecular trait(s)
          * Mapped molecular trait(s): Gene(s), Transcript(s), Protein(s) and Metabolite(s)

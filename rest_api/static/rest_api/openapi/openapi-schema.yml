  ## Publication endpoints ##
  /api/publication/all:
    get:
      tags:
        - "Publication endpoints"
      operationId: getAllPublications
      description: |
        Retrieve all the Publications, including for each of them:
          * Pubmed ID and doi
          * Publication title, journal, date and authors
          * Associated Dataset(s):
            * Platform
            * Biological tissue
            * Sample training information
            * Sample validation information
            * URLs to the data files

        Example of request:
        ```
        https://rest.omicspred.org/api/publication/all
        ```
        ---
        ###### **Filtering**

        You can choose to filter the results of this endpoint to a specified list of studies by providing a list of PubMed IDs (pmid) in one of two ways:
        1. A comma-seperated list of PubMed IDs in the request URL (this will not work for larger queries), e.g.:
        ```
        https://rest.omicspred.org/api/publication/all?filter_ids=36991119,35202437
        ```
        2. A json-formatted list of IDs, e.g.: `{ "filter_ids" : ["36991119","35202437"] }`. Example with curl:
        ```
        curl -X GET 'https://rest.omicspred.org/publication/all' -H 'Content-type:application/json' -d '{ "filter_ids" : ["36991119", "35202437"] }'
        ```
      parameters:
        - in: query
          name: filter_ids
          required: false
          schema:
            type: string
          description: Comma-separated list of PubMed IDs (without the prefix "PMID:")
          examples:
            pmid_sel:
              summary: Select an example or type PubMed ID(s) - click on 'Try it out' first
            pmid_1:
              summary: 'PMID: 36991119'
              value: 36991119
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    description: "List all the Publications"
                    type: array
                    items:
                      $ref: '#/components/schemas/Publication_extended'
          description: |
            List all the Publications
        
            ---

            __Notes:__ This endpoint uses pagination.
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)


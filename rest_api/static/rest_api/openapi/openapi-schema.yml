                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    description: "List of Genetic scores linked with the molecular trait"
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/Score_Ancestry'
                        - $ref: '#/components/schemas/Score_Performance'
          description: |
            List all the Genetic scores linked with the molecular trait
        
            ---

            __Notes:__ This endpoint uses pagination.
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)

  /api/score/performance/{opgs_id}:
    get:
      tags:
        - "Score endpoints"
      operationId: getScorePerformance
      description: |
        Retrieve an OmicsPred Genetic Score (OPGS) with its performance metrics, including:
          * Score ID and name
          * Method used
          * Dataset name
          * Publication information
          * Platform information
          * Tissue information
          * Reported molecular trait(s)
          * Mapped molecular trait(s): Gene(s), Transcript(s), Protein(s) and Metabolite(s)
          * Variants number
          * Variants genome build
          * Score license
          * Ancestry
          * Score performance metric(s) 
          * Cohort(s) associated with the performance metric(s)

        Example of request:
        ```
        https://rest.omicspred.org/api/score/performance/OPGS002402
        ```
      parameters:
      - name: opgs_id
        in: path
        required: true
        description: 'OmicsPred Score ID'
        examples:
          OPGS002402:
            value: 'OPGS002402'
          OPGS003423:
            value: 'OPGS003423'
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Score_Performance'
          description: 'OmicsPred Score with Performance Metrics'
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)



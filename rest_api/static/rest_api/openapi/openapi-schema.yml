  ## Phenotype endpoints ##
  /api/phenotype/{phenotype_id}:
    get:
      tags:
        - "Phenotype endpoints"
      operationId: getPhenotype
      description: |
        Retrieve the Phenotype information, including:
          * Phenotype ID and name
          * Trait category
          * Number ofLinked genetic Scores
          * Phenotype child entries **[** only when the parameter **include_children** is set to **1** **]**

        Examples of request:
        ```
        - https://rest.omicspred.org/api/phenotype/250.2
        - https://rest.omicspred.org/api/phenotype/250?include_children=1
        ```
      parameters:
        - name: phenotype_id
          in: path
          required: true
          description: 'Phenotype ID'
          examples:
            "250 (Diabetes mellitus)":
              value: '250'
            "250.2 (Type 2 diabetes)":
              value: '250.2'
          schema:
            type: string
        - in: query
          name: include_children
          required: false
          schema:
            type: integer
          description: Include the list of Phenotype child traits
          examples:
            exclude_asso_child_sel:
              summary: Exclude the list of Phenotype child traits
              value: 0
            include_asso_child_sel:
              summary: Include the list of Phenotype child traits
              value: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Phenotype_extended'
                  - $ref: '#/components/schemas/PhenotypeScoresCount'
          description: 'Phenotype information'
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)


  ## Score Application
  /api/applications_score/all:
    get:
      tags:
        - "Phenotype endpoints"
      operationId: getAllPhenotypeScores
      description: |
        Retrieve all the Phenotype Score associations, including for each of them:
          * OmicsPred Genetic Score (OPGS) ID
          * Associated phenotype information
          * Linked molecular trait(s) (genes, proteins and metabolites)
          * Platform information
          * Cohort information
          * Associated performances

        Example of request:
        ```
        https://rest.omicspred.org/api/applications_score/all
        ``` 
        ---
        ###### **Filtering**

        You can choose to filter the results of this endpoint to a specified list of genetic scores by providing a list of OmicsPred Genetic Score IDs (OPGS) in one of two ways:
        1. A comma-seperated list of scores in the request URL (this will not work for larger queries), e.g.:
        ```
        https://rest.omicspred.org/api/applications_score/all?filter_ids=OPGS002402,OPGS003423
        ```
        2. A json-formatted list of IDs, e.g.: `{ "filter_ids" : ["OPGS002402","OPGS003423"] }`. Example with curl:
        ```
        curl -X GET 'https://rest.omicspred.org/applications_score/all' -H 'Content-type:application/json' -d '{ "filter_ids" : ["OPGS002402", "OPGS003423"] }'
        ```
      parameters:
        - name: filter_ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of OmicsPred Score IDs or JSON object with an array of OmicsPred Score IDs
          examples:
            opgs_ids_sel:
              summary: Select an example or type OmicsPred Score ID(s) - click on 'Try it out' first
            opgs_ids_1:
              summary: 'OPGS002402, OPGS003423'
              value: 'OPGS002402,OPGS003423'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoreApplications'
          description: |
            All the Phenotype Score associations

            ---

            __Notes:__ This endpoint uses pagination.
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)

  /api/applications_score/{opgs_id}:
    get:
      tags:
        - "Phenotype endpoints"
      operationId: getPhenotypeScore
      description: |
        Retrieve all the Phenotype Score associations for a given Score ID, including for each of them:
          * OmicsPred Genetic Score (OPGS) ID
          * Associated phenotype information
          * Linked molecular trait(s) (genes, proteins and metabolites)
          * Platform information
          * Cohort information
          * Associated performances

        Example of request:
        ```
        https://rest.omicspred.org/api/applications_score/OPGS002402
        ```
      parameters:
      - name: opgs_id
        in: path
        required: true
        description: 'OmicsPred Score ID'
        schema:
          type: string
        examples:
          OPGS002402:
            value: 'OPGS002402'
          OPGS003423:
            value: 'OPGS003423'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoreApplications'
          description: |
            All the Phenotype Score associations for a given Score ID

            ---

            __Notes:__ This endpoint uses pagination.
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)

  /api/applications_score/search:
    get:
      tags:
        - "Phenotype endpoints"
      operationId: searchPhenotypeScores
      description: |
        Search Phenotype Score associations by OmicsPred Score ID or Phenotype ID.

        Each result includes:
          * OmicsPred Genetic Score (OPGS) ID
          * Associated phenotype information
          * Linked molecular trait(s) (genes, proteins and metabolites)
          * Platform information
          * Cohort information
          * Associated performances

        Examples of request:
        ```
        - https://rest.omicspred.org/api/applications_score/search?phenotype_id=250.2
        - https://rest.omicspred.org/api/applications_score/search?pmid=36991119
        - https://rest.omicspred.org/api/applications_score/search?pmid=36991119&molecular_trait=COL1A1
        ```
      parameters:
        - name: opgs_id
          required: false
          in: query
          description: OmicsPred Score ID - *optional*
          schema:
            type: string
          examples:
            op_sel:
              summary: Select an example or type an ID - click on 'Try it out' first
            OPGS002402:
              value: 'OPGS002402'
            OPGS003423:
              value: 'OPGS003423'
        - name: phenotype_id
          required: false
          in: query
          description: Phenotype ID - *optional*
          schema:
            type: string
          examples:
            op_sel:
              summary: Select an example or type an ID - click on 'Try it out' first
            pc_1:
              value: "557.1"
            pc_2:
              value: "250.2"
        - name: pmid
          required: false
          in: query
          description: PubMed ID (without the prefix "PMID:") - *optional*
          schema:
            type: integer
          examples:
              pmid_sel:
                summary: Select an example or type an ID - click on 'Try it out' first
              pmid_1:
                summary: 'PMID: 36991119'
                value: 36991119
        - name: molecular_trait
          required: false
          in: query
          description: Molecular trait name or ID (gene, protein or metabolite) - *optional*
          schema:
            type: string
          examples:
              mt_sel:
                summary: Select an example or type a name/ID - click on 'Try it out' first
              mt_1:
                summary: "Gene COL1A1"
                value: "COL1A1"
              mt_2:
                summary: "Protein P08887 (UniProt)"
                value: "P08887"
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoreApplications'
          description: |
           Phenotype Score associations related to the request
        
            ---

            __Notes:__ This endpoint uses pagination.
        '4XX':
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error_4XX'
          description: Client error (e.g. 400 - Bad request, 405 - Method not allowed)

